<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Analytics — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://code.highcharts.com/stock/highstock.js"></script>
<script src="https://code.highcharts.com/stock/modules/exporting.js"></script>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --fg: #171717;
    --fg-soft: #3f3f46;
    --muted-fg: #71717a;
    --label: #6b7280;
    --range-label: #999999;
    --border: #e5e5e5;
    --border-soft: #f0f0f0;
    --pill-bg: #f4f4f5;
    --pill-active-bg: #ffffff;
    --green: #21c45d;
    --green-soft: #ecfdf3;
    --red: #ef4444;
    --red-soft: #fef2f2;
    --line: #111111;
    --fill-top: rgba(0, 0, 0, 0.12);
    --fill-bottom: rgba(0, 0, 0, 0.01);
    --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --radius: 0.625rem;
    --radius-md: calc(var(--radius) - 2px);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) + 4px);
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    padding: 32px;
    min-height: 100vh;
  }

  .container { max-width: 1480px; margin: 0 auto; }

  /* ===== CARD ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  /* ===== HEADER ROW ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 24px 16px;
    flex-wrap: wrap;
  }

  .title-block { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .label-mono {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--label);
    margin: 0;
  }
  .title { font-size: 18px; font-weight: 700; color: var(--fg); margin: 0; line-height: 1.1; }

  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* Tab pills */
  .tabs {
    display: inline-flex;
    background: var(--pill-bg);
    border-radius: var(--radius-md);
    padding: 3px;
    gap: 2px;
  }
  .tab {
    border: 0;
    background: transparent;
    color: rgba(23, 23, 23, 0.6);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .tab:hover { color: var(--fg); }
  .tab.active {
    background: var(--pill-active-bg);
    color: var(--fg);
    box-shadow: var(--shadow-sm);
  }

  /* ===== HEADLINE VALUE ROW ===== */
  .value-row {
    padding: 4px 24px 16px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .value-big {
    font-size: 32px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--fg);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .change-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
    padding: 3px 8px;
    border-radius: 6px;
  }
  .change-pill.up { background: var(--green-soft); color: var(--green); }
  .change-pill.down { background: var(--red-soft); color: var(--red); }
  .change-pill .arrow { font-size: 10px; line-height: 1; }
  .change-period { color: var(--muted-fg); font-size: 12px; font-family: var(--mono); }

  /* ===== CHART ===== */
  .chart-wrap { padding: 4px 16px 12px; }
  #wallet-history-chart { width: 100%; height: 360px; }

  /* Highcharts overrides — matches the design hint comment */
  .highcharts-background { fill: transparent; }
  .highcharts-grid-line { stroke: var(--border-soft); }
  .highcharts-axis-line { stroke: transparent; }
  .highcharts-tick { stroke: transparent; }
  .highcharts-axis-labels text {
    fill: var(--muted-fg) !important;
    font-family: var(--mono) !important;
    font-size: 10px !important;
    text-transform: uppercase !important;
  }
  .highcharts-credits { display: none !important; }

  /* Range selector buttons — pill toggle in #999 / black */
  .highcharts-range-selector-buttons text {
    fill: var(--range-label) !important;
    font-family: var(--mono) !important;
    font-size: 11px !important;
    font-weight: 500 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.02em !important;
  }
  .highcharts-range-selector-buttons .highcharts-button-pressed text,
  .highcharts-range-selector-buttons .highcharts-button-hover text {
    fill: var(--fg) !important;
  }
  .highcharts-range-selector-buttons rect.highcharts-button-box {
    fill: transparent;
    stroke: transparent;
  }
  .highcharts-range-selector-buttons .highcharts-button-pressed rect.highcharts-button-box {
    fill: var(--card);
    stroke: transparent;
  }

  /* Date input labels above chart */
  .highcharts-range-label text,
  .highcharts-input-group text {
    fill: var(--muted-fg) !important;
    font-family: var(--mono) !important;
    font-size: 10px !important;
    text-transform: uppercase !important;
  }

  /* Navigator (the mini-chart scrubber at the bottom) */
  .highcharts-navigator-mask-inside { fill: rgba(17, 17, 17, 0.06) !important; }
  .highcharts-navigator-mask-outside { fill: rgba(17, 17, 17, 0.02) !important; }
  .highcharts-navigator-handle { fill: var(--card) !important; stroke: #111 !important; }
  .highcharts-navigator-outline { stroke: transparent !important; }
  .highcharts-navigator-series .highcharts-graph { stroke: #111 !important; stroke-width: 1.5 !important; }
  .highcharts-navigator-xaxis .highcharts-axis-labels text { fill: var(--muted-fg) !important; }

  /* Scrollbar — hide */
  .highcharts-scrollbar { display: none !important; }

  /* Tooltip black box, white text */
  .highcharts-tooltip-box { fill: #111 !important; stroke: transparent !important; }
  .highcharts-tooltip text { fill: #fff !important; font-family: var(--mono) !important; }

  /* Crosshair */
  .highcharts-crosshair { stroke: #111 !important; stroke-dasharray: 3 3 !important; opacity: 0.5 !important; }

  /* Hover marker */
  .highcharts-halo { fill: rgba(17, 17, 17, 0.12) !important; }
  .highcharts-point-hover { fill: #111 !important; stroke: #fff !important; stroke-width: 2 !important; }

  /* Hide the default chart title (we render our own) */
  .highcharts-title { display: none !important; }

  /* ===== STATS FOOTER ===== */
  .divider {
    height: 1px;
    background: var(--border-soft);
    margin: 0;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    align-items: stretch;
  }
  .stat {
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .stat + .stat::before {
    content: "";
    position: absolute;
    left: 0;
    top: 16px;
    bottom: 16px;
    width: 1px;
    background: var(--border-soft);
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    color: var(--label);
    letter-spacing: 0.04em;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--fg);
  }
  .stat-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted-fg);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* small responsive tightening */
  @media (max-width: 720px) {
    body { padding: 16px; }
    .header { padding: 16px 16px 12px; }
    .value-row { padding: 0 16px 12px; }
    #wallet-history-chart { height: 300px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat + .stat::before { display: none; }
    .stat:nth-child(odd) { border-right: 1px solid var(--border-soft); }
    .stat:nth-child(-n+2) { border-bottom: 1px solid var(--border-soft); }
    .value-big { font-size: 26px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Header -->
      <div class="header">
        <div class="title-block">
          <p class="label-mono">PORTFOLIO ANALYTICS</p>
          <h2 class="title" id="seriesTitle">Total Wallet Value</h2>
        </div>
        <div class="header-right">
          <div class="tabs" role="tablist" aria-label="Series">
            <button class="tab active" data-series="total">Total Value</button>
            <button class="tab" data-series="assets">Assets</button>
            <button class="tab" data-series="balance">Balance</button>
          </div>
        </div>
      </div>

      <!-- Headline value -->
      <div class="value-row">
        <p class="value-big" id="headlineValue">$0.00</p>
        <span class="change-pill up" id="changePill">
          <span class="arrow">▲</span>
          <span id="changePct">+0.00%</span>
        </span>
        <span class="change-period" id="changePeriod">All time</span>
      </div>

      <!-- Highcharts mounts here -->
      <div class="chart-wrap">
        <div id="wallet-history-chart"></div>
      </div>

      <div class="divider"></div>

      <!-- Stats footer -->
      <div class="stats">
        <div class="stat">
          <span class="stat-label">High</span>
          <span class="stat-value" id="statHigh">—</span>
          <span class="stat-sub" id="statHighDate">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Low</span>
          <span class="stat-value" id="statLow">—</span>
          <span class="stat-sub" id="statLowDate">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Open</span>
          <span class="stat-value" id="statOpen">—</span>
          <span class="stat-sub" id="statOpenDate">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Close</span>
          <span class="stat-value" id="statClose">—</span>
          <span class="stat-sub" id="statCloseDate">—</span>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  // ===== Mock dataset — highly volatile, like a real crypto portfolio =====
  // Highcharts Stock expects [timestamp_ms, value]. Hourly resolution.
  // Multiple overlapping waves (slow trend + medium swings + fast noise) plus a
  // mean-reverting random walk to keep it looking organic, not synthetic.
  function generateSeries(seedShift, scale, base, totalDays = 44) {
    const baseStart = new Date(2026, 2, 25).getTime(); // Mar 25, 2026
    const hourMs = 3_600_000;
    const totalHours = totalDays * 24;
    const pts = [];

    // mean-reverting walk: drifts but keeps coming back to a target
    let walk = 0;
    const volatility = base * 0.025;     // ~2.5% hourly stddev → big visible wiggles
    const meanReversion = 0.02;          // pulls walk back toward 0

    let v = base;
    let prevWalk = 0;

    for (let i = 0; i <= totalHours; i++) {
      const t = i / totalHours;

      // major step events (the plateau-to-plateau jumps from the screenshot)
      let jump = 0;
      if (t > 0.32 && t < 0.34) jump = (50_000 / 16) * scale;
      if (t > 0.55 && t < 0.56) jump = (8_000 / 8) * scale;
      if (t > 0.93 && t < 0.95) jump = (35_000 / 16) * scale;

      // multi-frequency oscillation — overlapping sine waves at different speeds
      const fast = Math.sin(i * 0.9 + seedShift) * base * 0.008;
      const med  = Math.sin(i * 0.22 + seedShift * 1.3) * base * 0.015;
      const slow = Math.sin(i * 0.06 + seedShift * 0.7) * base * 0.02;

      // mean-reverting random walk (Ornstein-Uhlenbeck-ish)
      const shock = (Math.random() - 0.5) * 2 * volatility;
      walk += shock - walk * meanReversion;

      // running base value tracks the step jumps without drifting
      v += jump;

      // total displayed value = base trend + oscillations + walk
      const displayed = v + (fast + med + slow + walk) * scale;

      pts.push([baseStart + i * hourMs, Math.max(displayed, base * 0.92)]);
      prevWalk = walk;
    }
    return pts;
  }

  const SERIES = {
    total: generateSeries(0, 1, 1_000_000),
    assets: generateSeries(1.2, 0.85, 800_000),
    balance: generateSeries(2.8, 0.4, 200_000),
  };
  const SERIES_TITLES = {
    total: "Total Wallet Value",
    assets: "Assets Value",
    balance: "Balance",
  };
  const SERIES_NAMES = {
    total: "Total Wallet Value",
    assets: "Assets Value",
    balance: "Balance",
  };

  // ===== Helpers =====
  const fmtMoney = (n) =>
    "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtDateLong = (ms) =>
    new Date(ms).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

  // ===== Highcharts global theme overrides =====
  Highcharts.setOptions({
    lang: { rangeSelectorZoom: "" },
    chart: {
      style: {
        fontFamily: '"DM Sans", system-ui, sans-serif',
      },
    },
  });

  let chart = null;
  let activeSeries = "total";

  function renderChart(seriesKey) {
    const data = SERIES[seriesKey];
    const titleText = SERIES_TITLES[seriesKey];
    const seriesName = SERIES_NAMES[seriesKey];

    // Match the old logic: red gradient when net negative, dark gradient otherwise.
    // Per the latest design hint we keep the line black (#111) and the gradient dark.
    const lineColor = "#111";
    const fillTop = "rgba(0,0,0,0.12)";
    const fillBottom = "rgba(0,0,0,0.01)";

    if (chart) { chart.destroy(); chart = null; }

    chart = Highcharts.stockChart("wallet-history-chart", {
      chart: {
        backgroundColor: "transparent",
        spacing: [8, 8, 8, 8],
        style: { fontFamily: '"DM Sans", system-ui, sans-serif' },
      },

      title: { text: titleText },

      credits: { enabled: false },
      exporting: { enabled: false },

      rangeSelector: {
        selected: 5, // "All"
        buttons: [
          { type: "month",  count: 1, text: "1M" },
          { type: "month",  count: 3, text: "3M" },
          { type: "month",  count: 6, text: "6M" },
          { type: "ytd",              text: "YTD" },
          { type: "year",   count: 1, text: "1Y" },
          { type: "all",              text: "ALL" },
        ],
        buttonTheme: {
          fill: "transparent",
          stroke: "transparent",
          "stroke-width": 0,
          r: 6,
          style: {
            color: "#999999",
            fontFamily: '"IBM Plex Mono", monospace',
            fontWeight: "500",
            fontSize: "11px",
          },
          states: {
            hover:    { fill: "#f4f4f5", style: { color: "#171717" } },
            select:   { fill: "#ffffff", style: { color: "#171717" } },
            disabled: { style: { color: "#cccccc" } },
          },
        },
        buttonPosition: { align: "right", x: 0, y: 0 },
        inputEnabled: false,
        labelStyle: { color: "#71717a", fontFamily: '"IBM Plex Mono", monospace', fontSize: "11px" },
      },

      navigator: {
        height: 36,
        margin: 12,
        outlineWidth: 0,
        maskFill: "rgba(17,17,17,0.06)",
        handles: {
          backgroundColor: "#ffffff",
          borderColor: "#111111",
          height: 18,
          width: 8,
        },
        series: {
          type: "areaspline",
          color: lineColor,
          lineWidth: 1.5,
          fillOpacity: 0.05,
        },
        xAxis: {
          gridLineWidth: 0,
          labels: {
            style: { color: "#71717a", fontFamily: '"IBM Plex Mono", monospace', fontSize: "10px" },
          },
        },
      },

      scrollbar: { enabled: false },

      xAxis: {
        lineColor: "transparent",
        tickColor: "transparent",
        labels: {
          style: { color: "#71717a", fontFamily: '"IBM Plex Mono", monospace', fontSize: "10px" },
        },
        crosshair: {
          color: "#111111",
          dashStyle: "ShortDash",
          width: 1,
        },
      },

      yAxis: {
        gridLineColor: "#f0f0f0",
        gridLineDashStyle: "Solid",
        opposite: true,
        labels: {
          align: "right",
          x: -4,
          formatter: function () {
            return "$" + Highcharts.numberFormat(this.value, 0, ".", ",");
          },
          style: { color: "#71717a", fontFamily: '"IBM Plex Mono", monospace', fontSize: "10px" },
        },
      },

      tooltip: {
        backgroundColor: "#111111",
        borderColor: "transparent",
        borderRadius: 8,
        borderWidth: 0,
        shadow: false,
        useHTML: true,
        formatter: function () {
          const dateStr = Highcharts.dateFormat("%b %e, %Y", this.x);
          return (
            '<div style="font-family:\'IBM Plex Mono\',monospace;color:#fff;line-height:1.4;">' +
              '<div style="color:rgba(255,255,255,0.6);font-size:10px;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px;">' + dateStr + '</div>' +
              '<div style="font-weight:700;font-size:13px;">$' + Highcharts.numberFormat(this.y, 2) + '</div>' +
            '</div>'
          );
        },
      },

      plotOptions: {
        series: {
          marker: { enabled: false, states: { hover: { enabled: true, radius: 4, lineWidth: 2, lineColor: "#fff", fillColor: "#111" } } },
          states: { hover: { halo: { size: 8, opacity: 0.12 } } },
        },
      },

      series: [{
        name: seriesName,
        data: data,
        type: "area",
        tooltip: { valueDecimals: 2 },
        fillColor: {
          linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 },
          stops: [[0, fillTop], [1, fillBottom]],
        },
        lineColor: lineColor,
        lineWidth: 2,
        states: { hover: { lineWidth: 2 } },
        threshold: null,
      }],
    });

    updateHeadline(seriesKey, data);
  }

  function updateHeadline(seriesKey, data) {
    const first = data[0][1];
    const last = data[data.length - 1][1];
    const pct = ((last - first) / first) * 100;
    const isUp = pct >= 0;

    document.getElementById("seriesTitle").textContent = SERIES_TITLES[seriesKey];
    document.getElementById("headlineValue").textContent = fmtMoney(last);

    const pill = document.getElementById("changePill");
    pill.classList.toggle("up", isUp);
    pill.classList.toggle("down", !isUp);
    pill.querySelector(".arrow").textContent = isUp ? "▲" : "▼";
    document.getElementById("changePct").textContent = (isUp ? "+" : "") + pct.toFixed(2) + "%";
    document.getElementById("changePeriod").textContent = "All time";

    // High / Low / Open / Close
    let high = data[0], low = data[0];
    for (const p of data) {
      if (p[1] > high[1]) high = p;
      if (p[1] < low[1]) low = p;
    }
    document.getElementById("statHigh").textContent = fmtMoney(high[1]);
    document.getElementById("statHighDate").textContent = fmtDateLong(high[0]);
    document.getElementById("statLow").textContent = fmtMoney(low[1]);
    document.getElementById("statLowDate").textContent = fmtDateLong(low[0]);
    document.getElementById("statOpen").textContent = fmtMoney(data[0][1]);
    document.getElementById("statOpenDate").textContent = fmtDateLong(data[0][0]);
    document.getElementById("statClose").textContent = fmtMoney(last);
    document.getElementById("statCloseDate").textContent = fmtDateLong(data[data.length - 1][0]);
  }

  // ===== Tabs =====
  document.querySelectorAll(".tab").forEach((b) => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      activeSeries = b.dataset.series;
      renderChart(activeSeries);
    });
  });

  // ===== Initial render =====
  renderChart(activeSeries);
})();
</script>
</body>
</html>
