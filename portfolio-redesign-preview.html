<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Overview Redesign</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    { "imports": {
        "preact": "https://esm.sh/preact@10.25.4",
        "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
        "htm": "https://esm.sh/htm@3.1.1"
    }}
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    body { background: #fff; margin: 0; font-family: 'DM Sans', sans-serif; }
    .scroll-hidden { overflow-y: auto; scrollbar-width: none; }
    .scroll-hidden::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { h, render } from "preact";
    import { useState } from "preact/hooks";
    import htm from "htm";
    const html = htm.bind(h);

    const HOLDINGS = [
      { id: "bitcoin",   name: "Bitcoin",   symbol: "BTC",     quantity: 4.9018,          usdValue: 368966.81,   change24h: -0.31,  logo: "https://assets.coingecko.com/coins/images/1/small/bitcoin.png" },
      { id: "usd",       name: "Play USD",  symbol: "USD",     quantity: 312474.77,       usdValue: 312474.77,   change24h: 0,      logo: "https://cdn-icons-png.flaticon.com/512/3215/3215522.png" },
      { id: "xrp",       name: "XRP",       symbol: "XRP",     quantity: 74626.8657,      usdValue: 105970.15,   change24h: -0.79,  logo: "https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png" },
      { id: "ethereum",  name: "Ethereum",  symbol: "ETH",     quantity: 24.2353,         usdValue: 55950.48,    change24h: -0.79,  logo: "https://assets.coingecko.com/coins/images/279/small/ethereum.png" },
      { id: "bnb",       name: "BNB",       symbol: "BNB",     quantity: 81.1649,         usdValue: 50797.85,    change24h: 0.55,   logo: "https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png" },
      { id: "tether",    name: "Tether",    symbol: "USDT",    quantity: 50034.0231,      usdValue: 50034.02,    change24h: -0.01,  logo: "https://assets.coingecko.com/coins/images/325/small/Tether.png" },
      { id: "dogecoin",  name: "Dogecoin",  symbol: "DOGE",    quantity: 456911.4083,     usdValue: 43081.72,    change24h: -0.17,  logo: "https://assets.coingecko.com/coins/images/5/small/dogecoin.png" },
      { id: "bonk",      name: "Bonk",      symbol: "BONK",    quantity: 6413685695.2372, usdValue: 39059.35,    change24h: 0.71,   logo: "https://assets.coingecko.com/coins/images/28600/small/bonk.jpg" },
      { id: "pepe",      name: "Pepe",      symbol: "PEPE",    quantity: 10333160286.77,  usdValue: 38956.01,    change24h: 0.70,   logo: "https://assets.coingecko.com/coins/images/29850/small/pepe-token.jpeg" },
      { id: "harambe",   name: "Harambe",   symbol: "HARAMBE", quantity: 0.7125,          usdValue: 0.00,        change24h: -1.11,  logo: "https://assets.coingecko.com/coins/images/38297/small/photo_2024-06-18_01-35-46.jpg" },
    ];

    // Grayscale shades for allocation bar (darkest = largest holding).
    const BAR_SHADES = ["#111111", "#2e2e2e", "#484848", "#606060", "#787878", "#8e8e8e", "#a2a2a2", "#b5b5b5", "#c6c6c6", "#d4d4d4"];
    const OTHER_COLOR = "#ececec";
    const MIN_N = 6;
    const MAX_N = 10;

    // Build segments: start with top MIN_N, keep pulling the next biggest in
    // until "Other" <= smallest visible segment (so Other isn't misleading).
    // Hard-cap at MAX_N so a 100-coin portfolio doesn't explode into 99 segments.
    // Past the cap, Other may legitimately be the largest segment — which is
    // honest for highly-diversified portfolios.
    function buildSegments(holdings) {
      const sorted = [...holdings].filter(h => h.usdValue > 0).sort((a, b) => b.usdValue - a.usdValue);
      if (sorted.length <= MIN_N) {
        return sorted.map((h, i) => ({ ...h, color: BAR_SHADES[i] || OTHER_COLOR, isOther: false }));
      }

      let shownCount = MIN_N;
      while (shownCount < sorted.length && shownCount < MAX_N) {
        const otherValue = sorted.slice(shownCount).reduce((s, h) => s + h.usdValue, 0);
        const smallestShown = sorted[shownCount - 1].usdValue;
        if (otherValue <= smallestShown) break;
        shownCount++;
      }

      const top = sorted.slice(0, shownCount).map((h, i) => ({
        ...h,
        color: BAR_SHADES[i] || BAR_SHADES[BAR_SHADES.length - 1],
        isOther: false,
      }));
      const rest = sorted.slice(shownCount);
      if (rest.length === 0) return top;

      const otherValue = rest.reduce((s, h) => s + h.usdValue, 0);
      return [
        ...top,
        { id: "__other__", symbol: "Other", name: `${rest.length} coin${rest.length === 1 ? '' : 's'}`, usdValue: otherValue, color: OTHER_COLOR, isOther: true },
      ];
    }

    // Stress-test dataset: 100 coins each at ~1% to see how the cap behaves.
    const STRESS_HOLDINGS = Array.from({ length: 100 }, (_, i) => ({
      id: `coin-${i}`,
      name: `Coin ${i + 1}`,
      symbol: `C${i + 1}`,
      quantity: 100,
      usdValue: 10000 + Math.random() * 2000, // ~$10k-$12k each
      change24h: (Math.random() - 0.5) * 10,
      logo: "https://cdn-icons-png.flaticon.com/512/3215/3215522.png",
    }));

    function getSegments(mode) {
      return mode === "stress" ? buildSegments(STRESS_HOLDINGS) : buildSegments(HOLDINGS);
    }
    function getHoldings(mode) {
      return mode === "stress" ? STRESS_HOLDINGS : HOLDINGS;
    }


    function fmt(n) {
      return new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
    }

    function fmtQty(n) {
      if (n >= 1000) return new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
      if (n >= 1) return new Intl.NumberFormat("en-US", { minimumFractionDigits: 4, maximumFractionDigits: 4 }).format(n);
      return new Intl.NumberFormat("en-US", { minimumFractionDigits: 4, maximumFractionDigits: 6 }).format(n);
    }

    function PriceChangeBox({ change }) {
      if (change === 0) return null;
      const pos = change > 0;
      const bg = pos ? 'bg-green-50' : 'bg-red-50';
      const color = pos ? 'color: #21c45d' : 'color: #ef4444';

      return html`
        <div class="flex gap-0.5 rounded-md px-1.5 py-0.5 items-center ${bg}">
          <span class="text-xs font-bold font-mono" style="${color}">${pos ? '↑' : '↓'} ${fmt(Math.abs(change))}%</span>
        </div>
      `;
    }

    function HoldingRow({ holding, isLast }) {
      const border = isLast ? '' : 'border-b border-[#f0f0f0]';

      return html`
        <div class="flex items-center gap-3 py-3.5 ${border}">
          <img src=${holding.logo} class="size-8 rounded-full" alt=${holding.name} />

          <div class="flex flex-col min-w-0 flex-1">
            <span class="text-sm font-semibold truncate">${holding.name}</span>
            <span class="text-xs text-gray-500 font-mono">${holding.symbol}</span>
          </div>

          <div class="flex flex-col items-end gap-0.5">
            <b class="text-sm font-mono">$${fmt(holding.usdValue)}</b>
            <div class="flex items-center gap-1.5">
              <span class="text-xs text-gray-500 font-mono">${fmtQty(holding.quantity)} ${holding.symbol}</span>
              ${holding.change24h !== 0 && html`<${PriceChangeBox} change=${holding.change24h} />`}
            </div>
          </div>
        </div>
      `;
    }

    function PortfolioOverview({ mode }) {
      const [hovered, setHovered] = useState(null);
      const holdings = getHoldings(mode);
      const segments = getSegments(mode);
      const totalValue = holdings.reduce((s, h) => s + h.usdValue, 0);

      return html`
        <div class="bg-white rounded-xl border border-[#e8e8e8] shadow-sm overflow-hidden">
          <!-- Header -->
          <div class="p-5 pb-4 border-b border-[#f0f0f0]">
            <p class="text-xs text-gray-500 font-mono mb-1">PORTFOLIO VALUE</p>
            <b class="text-2xl">$${fmt(totalValue)}</b>

            <!-- Allocation Bar -->
            <div class="flex w-full h-2 rounded-full overflow-hidden gap-[2px] mt-3">
              ${segments.map(seg => {
                const pct = (seg.usdValue / totalValue) * 100;
                const dimmed = hovered && hovered !== seg.id;
                return html`
                  <div
                    key=${seg.id}
                    class="h-full rounded-full cursor-pointer"
                    style=${{
                      width: pct + '%',
                      backgroundColor: seg.color,
                      minWidth: 4,
                      opacity: dimmed ? 0.2 : 1,
                      transition: 'opacity 0.2s ease',
                    }}
                    onMouseEnter=${() => setHovered(seg.id)}
                    onMouseLeave=${() => setHovered(null)}
                  />
                `;
              })}
            </div>
            <div class="flex flex-wrap gap-x-3 gap-y-1 mt-2">
              ${segments.map(seg => {
                const dimmed = hovered && hovered !== seg.id;
                const pct = ((seg.usdValue / totalValue) * 100).toFixed(1);
                return html`
                  <div
                    key=${seg.id}
                    class="flex items-center gap-1 cursor-pointer"
                    style=${{ opacity: dimmed ? 0.3 : 1, transition: 'opacity 0.2s ease' }}
                    onMouseEnter=${() => setHovered(seg.id)}
                    onMouseLeave=${() => setHovered(null)}
                  >
                    <div class="w-2 h-2 rounded-full" style=${{ backgroundColor: seg.color }} />
                    <span class="text-[10px] text-gray-500 font-mono">
                      ${seg.isOther ? `Other (${seg.name}) ${pct}%` : `${seg.symbol} ${pct}%`}
                    </span>
                  </div>
                `;
              })}
            </div>
          </div>

          <!-- Holdings -->
          <div class="px-5 pt-1 pb-2">
            <div class="flex justify-between items-center py-3 mb-0.5">
              <p class="text-xs text-gray-500 font-mono">HOLDINGS</p>
              <p class="text-xs text-gray-500 font-mono">VALUE</p>
            </div>

            <div class="relative">
              <div class="max-h-[400px] scroll-hidden" id="holdings-list">
                ${holdings.map((h, i) => html`
                  <${HoldingRow}
                    key=${h.id}
                    holding=${h}
                    isLast=${i === holdings.length - 1}
                  />
                `)}
              </div>
              <div class="pointer-events-none absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-white to-transparent" id="scroll-fade" />
            </div>
          </div>
        </div>
      `;
    }

    function App() {
      const [mode, setMode] = useState("real");
      const btn = (v, label) => html`
        <button
          onClick=${() => setMode(v)}
          class="px-3 py-1.5 rounded-md text-xs font-mono border transition-colors cursor-pointer"
          style=${{
            background: mode === v ? '#111' : 'white',
            color: mode === v ? 'white' : '#555',
            borderColor: mode === v ? '#111' : '#ddd',
          }}
        >${label}</button>
      `;
      return html`
        <div class="flex flex-col items-center p-10 gap-4" style="min-height:100vh; background:#fff">
          <div class="flex gap-2">
            ${btn("real", "Real (10 coins)")}
            ${btn("stress", "Stress test (100 coins)")}
          </div>
          <div style="width: 460px">
            <${PortfolioOverview} mode=${mode} />
          </div>
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById("root"));
  </script>
</body>
</html>
